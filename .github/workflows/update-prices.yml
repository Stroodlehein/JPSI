name: Update JPSI price feeds

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch prices -> prices.json
        run: |
          python scripts/fetch_prices.py

      - name: Commit updated prices.json
        run: |
          git config user.name "jpsi-bot"
          git config user.email "jpsi-bot@users.noreply.github.com"
          git add prices.json
          git commit -m "Update price feeds" || echo "No changes"
          git push
