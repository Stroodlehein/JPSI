name: Update JPSI price feeds

on:
  schedule:
    - cron: "35 0 * * *"   # Once daily at 00:35 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch prices -> prices.json
        run: |
          python scripts/fetch_prices.py

      - name: Commit updated prices.json only
        run: |
          git config user.name "JPMI Bot"
          git config user.email "bot@japanphysicalmetals.jp"
          git add prices.json
          git diff --cached --quiet || git commit -m "Update price feeds $(date -u +'%Y-%m-%d')"
          git push
