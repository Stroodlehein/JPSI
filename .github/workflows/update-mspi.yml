name: Update MSPI-B Street Price

on:
  workflow_dispatch:
    inputs:
      listing_1_coin:
        description: 'Listing 1 — Coin name'
        required: true
      listing_1_jpy:
        description: 'Listing 1 — Sold price (¥)'
        required: true
      listing_1_jpy_g:
        description: 'Listing 1 — ¥ per gram'
        required: true
      listing_2_coin:
        description: 'Listing 2 — Coin name'
        required: false
      listing_2_jpy:
        description: 'Listing 2 — Sold price (¥)'
        required: false
      listing_2_jpy_g:
        description: 'Listing 2 — ¥ per gram'
        required: false
      listing_3_coin:
        description: 'Listing 3 — Coin name'
        required: false
      listing_3_jpy:
        description: 'Listing 3 — Sold price (¥)'
        required: false
      listing_3_jpy_g:
        description: 'Listing 3 — ¥ per gram'
        required: false
      listing_4_coin:
        description: 'Listing 4 — Coin name'
        required: false
      listing_4_jpy:
        description: 'Listing 4 — Sold price (¥)'
        required: false
      listing_4_jpy_g:
        description: 'Listing 4 — ¥ per gram'
        required: false
      listing_5_coin:
        description: 'Listing 5 — Coin name'
        required: false
      listing_5_jpy:
        description: 'Listing 5 — Sold price (¥)'
        required: false
      listing_5_jpy_g:
        description: 'Listing 5 — ¥ per gram'
        required: false
      listing_6_coin:
        description: 'Listing 6 — Coin name'
        required: false
      listing_6_jpy:
        description: 'Listing 6 — Sold price (¥)'
        required: false
      listing_6_jpy_g:
        description: 'Listing 6 — ¥ per gram'
        required: false
      listing_7_coin:
        description: 'Listing 7 — Coin name'
        required: false
      listing_7_jpy:
        description: 'Listing 7 — Sold price (¥)'
        required: false
      listing_7_jpy_g:
        description: 'Listing 7 — ¥ per gram'
        required: false
      listing_8_coin:
        description: 'Listing 8 — Coin name'
        required: false
      listing_8_jpy:
        description: 'Listing 8 — Sold price (¥)'
        required: false
      listing_8_jpy_g:
        description: 'Listing 8 — ¥ per gram'
        required: false

jobs:
  update-mspi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update MSPI-B
        env:
          L1_COIN:  ${{ github.event.inputs.listing_1_coin }}
          L1_JPY:   ${{ github.event.inputs.listing_1_jpy }}
          L1_JPYG:  ${{ github.event.inputs.listing_1_jpy_g }}
          L2_COIN:  ${{ github.event.inputs.listing_2_coin }}
          L2_JPY:   ${{ github.event.inputs.listing_2_jpy }}
          L2_JPYG:  ${{ github.event.inputs.listing_2_jpy_g }}
          L3_COIN:  ${{ github.event.inputs.listing_3_coin }}
          L3_JPY:   ${{ github.event.inputs.listing_3_jpy }}
          L3_JPYG:  ${{ github.event.inputs.listing_3_jpy_g }}
          L4_COIN:  ${{ github.event.inputs.listing_4_coin }}
          L4_JPY:   ${{ github.event.inputs.listing_4_jpy }}
          L4_JPYG:  ${{ github.event.inputs.listing_4_jpy_g }}
          L5_COIN:  ${{ github.event.inputs.listing_5_coin }}
          L5_JPY:   ${{ github.event.inputs.listing_5_jpy }}
          L5_JPYG:  ${{ github.event.inputs.listing_5_jpy_g }}
          L6_COIN:  ${{ github.event.inputs.listing_6_coin }}
          L6_JPY:   ${{ github.event.inputs.listing_6_jpy }}
          L6_JPYG:  ${{ github.event.inputs.listing_6_jpy_g }}
          L7_COIN:  ${{ github.event.inputs.listing_7_coin }}
          L7_JPY:   ${{ github.event.inputs.listing_7_jpy }}
          L7_JPYG:  ${{ github.event.inputs.listing_7_jpy_g }}
          L8_COIN:  ${{ github.event.inputs.listing_8_coin }}
          L8_JPY:   ${{ github.event.inputs.listing_8_jpy }}
          L8_JPYG:  ${{ github.event.inputs.listing_8_jpy_g }}
        run: python scripts/update_mspi.py

      - name: Commit and push
        run: |
          git config user.name "JPMI Bot"
          git config user.email "bot@japanphysicalmetals.jp"
          git add prices.json prices-history.json
          git diff --cached --quiet || git commit -m "MSPI-B update $(date -u +'%Y-%m-%d')"
          git push
